---
- name: Install and Configure Nginx
  hosts: mgmt
  become: yes
  tasks:
    - name Install Nginx
      apt:
        name: nginx
        state: present

    - name: Remove default Nginx configuraton file
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Add Costum Nginx configuration file
      template:
        stc: /path/to/your/nginx-config.conf.j2
        dest: /etc/nginx/sityes-available/my-nginx-config
        owner: root
        group: root
        moe: '0644'

    - name: Enable costum Nginx configuration
      file:
        src: /etc/nginx/sites-available/my-nginx-config
        dest: /etc/nginx/sites-enabled/
        state: link
